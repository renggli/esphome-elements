# All supported animation types.
- type: meatballs_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: triadic
        color: "#FF5722"
- type: aurora_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: gradient
        from: "#000000"
        to: "#4CAF50"
      - type: gradient
        from: "#4CAF50"
        to: "#00FF41"
- type: kaleidoscope_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        fraction: 0.25
        color: "#000000"
      - type: complementary
        color: "#2196F3"
- type: plasma_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        fraction: 0.25
        color: "#000000"
      - type: complementary
        color: "#9C27B0"
        sweep: 60.0
      - type: static
        fraction: 0.25
        color: "#000000"
- type: ripples_animation
  color_scheme:
    type: gradient
    to: "#40E0D0"
    from: "#010810"
- type: spiral_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        fraction: 0.25
        color: "#000000"
      - type: triadic
        color: "#FFEB3B"
- type: voronoi_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: triadic
        color: "#E91E63"
- type: interference_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: square
        color: "#673AB7"
- type: julia_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: complementary
        color: "#ff0000"
- type: matrix_animation
  color_scheme:
    type: monochromatic
    color: "#00FF41"
    min_brightness: 0.0
- type: fire_animation
  color_scheme:
    type: sequence
    schemes:
      - type: gradient
        from: "#000000"
        to: "#A01010"
        fraction: 0.1
      - type: gradient
        from: "#A01010"
        to: "#FF6000"
        fraction: 0.2
      - type: gradient
        from: "#FF6000"
        to: "#FFF000"
        fraction: 0.7
- type: tunnel_animation
  color_scheme:
    type: triadic
    color: "#AA00FF"
- type: wave_animation
  color_scheme:
    type: sequence
    schemes:
      - type: static
        color: "#000000"
      - type: analogous
        color: "#00E5FF"
      - type: analogous
        color: "#00e5ff"
- type: stars_animation
  color_scheme:
    type: gradient
    from: "#000000"
    to: "#90CAF9"
- type: parallax_animation
  layers: 4
  color_scheme:
    type: sequence
    schemes:
      - type: gradient
        from: "#000000"
        to: "#102030"
      - type: gradient
        from: "#C0D0E0"
        to: "#8090A0"
      - type: gradient
        from: "#808090"
        to: "#505060"
      - type: gradient
        from: "#60A060"
        to: "#305030"
      - type: gradient
        from: "#80FF80"
        to: "#408040"
- type: lorenz_animation
  color_scheme:
    type: monochromatic
    color: "#90CAF9"
